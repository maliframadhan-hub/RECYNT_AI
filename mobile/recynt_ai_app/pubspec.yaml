name: recynt_ai_app
description: "RECYNT AI - Recycle Intelligent Waste Detection System (Mobile App)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Networking
  http: ^1.2.1

  # Local storage (menyimpan token JWT)
  shared_preferences: ^2.2.3

  # Kamera & pemilihan gambar
  image_picker: ^1.1.2

  # Font kustom (Google Fonts, sesuai tema web: Space Grotesk + JetBrains Mono)
  google_fonts: ^6.2.1

  # State management ringan
  provider: ^6.1.2

  # Format tanggal
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Uncomment & sesuaikan jika menambahkan aset gambar/logo custom
  # assets:
  #   - assets/images/
